<div class="container">
  <h2>Login</h2>

  <input type="email" placeholder="Correo" [(ngModel)]="user.email">
  <input type="password" placeholder="Contraseña" [(ngModel)]="user.password">

  <button (click)="iniciarSesion()">Entrar</button>

  <div *ngIf="mostrar2FA">
    <h3>Verificación 2FA</h3>
    <input type="text" placeholder="Código" [(ngModel)]="codigo">
    <button (click)="verificarCodigo()">Verificar</button>
  </div>

  <p>{{ mensaje }}</p>
</div>
